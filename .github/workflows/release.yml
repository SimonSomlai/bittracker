name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "Tag v$TAG does not match package.json version $VERSION" >&2
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Package macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
        run: pnpm exec electron-builder --mac dmg

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Skip postinstall: it rebuilds native modules for macOS ARM64 via Unix env var
      # syntax that doesn't work on Windows. electron-builder's @electron/rebuild
      # handles native modules for Windows x64 automatically during packaging.
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm build

      - name: Package Windows NSIS
        run: pnpm exec electron-builder --win nsis --x64

      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: release

      - uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: release

      - name: Generate checksums
        run: bash scripts/generate-checksums.sh

      - name: Generate release notes
        run: node scripts/release-notes-body.mjs > release/RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release/RELEASE_NOTES.md
          files: |
            release/BitTracker-*.dmg
            release/BitTracker-*.exe
            release/SHA256SUMS
          draft: false
          prerelease: false
